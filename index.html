<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jothy</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcf8f7;
            --text-main: #7a6e6e;
            --accent: #bfa3a3;
        }

        * { box-sizing: border-box; transition: all 0.4s ease; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            width: 85%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.8s ease-out; }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .gif-wrap { width: 180px; margin: 0 auto 20px; }
        .gif-wrap img { width: 100%; border-radius: 20px; }

        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 50px;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
        }

        #no-btn {
            background: #eee;
            color: #888;
            position: absolute;
            z-index: 999;
        }

        .song-text {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #8e7f7f;
            margin-bottom: 25px;
        }

        audio { width: 100%; height: 40px; margin-top: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- PAGE 1 -->
        <div id="page1" class="page active">
            <div class="gif-wrap floating">
                <!-- Stable Direct GIF Link -->
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpueW9oZ3M0dWZ3am93Y3R3Y3N0am93Y3R3Y3N0am93Y3R3YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/VduFvSgSPrXqmJs8C5/giphy.gif" alt="Hehe Cat">
            </div>
            <h1>good mrngg jothyyy</h1>
            <button onclick="showPage(2)">Morning!</button>
        </div>

        <!-- PAGE 2 -->
        <div id="page2" class="page">
            <h1>Can I ask you something?</h1>
            <p>Will you promise to have an amazing day today?</p>
            <div class="btn-group">
                <button onclick="showPage(3)">Yes</button>
                <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">No</button>
            </div>
        </div>

        <!-- PAGE 3 -->
        <div id="page3" class="page">
            <h1>For you pookie</h1>
            <p class="song-text">"This song felt like you… soft and beautiful. Hope it makes you smile."</p>
            
            <!-- Audio Tag -->
            <audio id="myAudio" controls loop>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
            <p style="font-size: 0.7rem; margin-top: 20px; color: #ccc;">(Click play if it doesn't start automatically)</p>
        </div>
    </div>

    <script>
        const audio = document.getElementById('myAudio');

        function showPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            
            // To fix audio on GitHub/Mobile: We trigger 'play' on the first button click
            if(num === 2 || num === 3) {
                audio.play().then(() => {
                    // If we aren't on page 3 yet, mute it or keep volume 0 until page 3
                    if(num === 2) { audio.volume = 0; } else { audio.volume = 1; }
                }).catch(e => console.log("Audio waiting for interaction"));
            }
        }

        function moveNo() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 50);
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
