<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jothy</title>
    <!-- Aesthetic Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fcf8f7; /* Soft cream */
            --text-main: #7a6e6e; /* Muted brown-grey */
            --accent: #bfa3a3; /* Dusty rose */
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            width: 85%;
            max-width: 400px;
            position: relative;
        }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.8s ease-out; }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 2.8rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        /* GIF Styling - Page 1 Only */
        .gif-wrap {
            width: 180px;
            margin: 0 auto 20px;
        }

        .gif-wrap img {
            width: 100%;
            border-radius: 20px;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 50px;
            position: relative;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Quicksand', sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button:hover {
            background: #ab8e8e;
            transform: translateY(-2px);
        }

        /* Moving "No" Button Style */
        #no-btn {
            background: #eee;
            color: #888;
            position: absolute;
            box-shadow: none;
            z-index: 100;
        }

        .song-text {
            font-style: italic;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #8e7f7f;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        audio {
            width: 100%;
            height: 40px;
            opacity: 0.8;
            filter: sepia(0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle float for the cat animation */
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- PAGE 1: GREETING -->
        <div id="page1" class="page active">
            <div class="gif-wrap floating">
                <!-- HEHE CAT GIF -->
                <img src="https://media.tenor.com/I7S8H9G1uOAAAAAi/hehe.gif" alt="Hehe Cat">
            </div>
            <h1>good mrngg jothyyy</h1>
            <button onclick="showPage(2)">Morning!</button>
        </div>

        <!-- PAGE 2: THE QUESTION -->
        <div id="page2" class="page">
            <h1>Can I ask you something?</h1>
            <p>Will you promise to have an amazing day today?</p>
            <div class="btn-group">
                <button id="yes-btn" onclick="showPage(3)">Yes</button>
                <button id="no-btn" onmouseover="moveNo()">No</button>
            </div>
        </div>

        <!-- PAGE 3: THE SONG -->
        <div id="page3" class="page">
            <h1>For you pookie</h1>
            <p class="song-text">"This song felt like you… soft and beautiful. Hope it makes you smile."</p>
            
            <audio id="myAudio" controls>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <p style="font-size: 0.7rem; margin-top: 25px; color: #ccc;">(Click play to listen)</p>
        </div>
    </div>

    <script>
        function showPage(num) {
            // Transitions between pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + num).classList.add('active');
            
            // Auto-play attempt for the song when arriving at page 3
            if(num === 3) {
                const audio = document.getElementById('myAudio');
                audio.play().catch(() => console.log("User must click play manually due to browser rules"));
            }
        }

        function moveNo() {
            const btn = document.getElementById('no-btn');
            // Calculate random jumping position anywhere on the screen
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 50);
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 50);
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
